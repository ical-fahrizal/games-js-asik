<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Create Games</title>

    <style>
      body {
        margin: 0;
        background: white;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 500px;
      }

      h1 {
        text-align: center;
      }

      .game {
        border: 2px solid black;
        padding: 20px;
        margin-bottom: 20px;
        cursor: pointer;
        transition: 0.3s;
      }

      .game:hover {
        background: black;
        color: white;
      }

      .title {
        font-size: 24px;
        font-weight: bold;
      }

      .desc {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PILIH GAME</h1>

      <div class="game" onclick="location.href = './game-1/main.html'">
        <div class="title">✈️ Game 1</div>
        <div class="desc">Jet Shooter</div>
      </div>

      <!-- <div class="game" onclick="location.href = './game-2/main.html'">
        <div class="title">🦖 Game 2</div>
        <div class="desc">Dino Runner</div>
      </div>

      <div class="game" onclick="location.href = './game-3/main.html'">
        <div class="title">🚗 Game 3</div>
        <div class="desc">Car Racing</div>
      </div> -->

  </body>
</html>
