<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jet Shooter</title>
    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      canvas {
        background: white;
        border: 2px solid black;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      button {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="500" height="700"></canvas>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      resizeCanvas();

      window.addEventListener("resize", resizeCanvas);

      let life = 3;
      let explosions = [];
      let stars = [];

      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
        });
      }

      let score = 0;
      let gameOver = false;

      const player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        width: 50,
        height: 60,
      };

      let bullets = [];
      let enemyTarget = 1;
      let enemies = [];
      let fireTimer = 0;
      let timer = 0;

      enemyTarget = Math.min(enemyTarget + 1, 20);

      function movePlayer(x, y) {
        player.x = x - player.width / 2;
        player.y = y - player.height / 2;

        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

        player.y = Math.max(
          0,
          Math.min(canvas.height - player.height, player.y),
        );
      }

      canvas.addEventListener("pointermove", (e) => {
        const rect = canvas.getBoundingClientRect();

        movePlayer(e.clientX - rect.left, e.clientY - rect.top);
      });

      function createEnemy() {
        enemies.push({
          x: Math.random() * (canvas.width - 50),
          y: -40,
          width: 40,
          height: 40,
          speed: 3 + Math.random() * 2,
        });
      }

      function update() {
        if (gameOver) return;

        fireTimer++;

        if (fireTimer >= 12) {
          bullets.push({
            x: player.x + 16,
            y: player.y,
            width: 4,
            height: 15,
          });

          fireTimer = 0;
        }

        bullets.forEach((b) => (b.y -= 8));
        bullets = bullets.filter((b) => b.y > -20);

        enemies.forEach((e) => (e.y += e.speed));

        explosions.forEach((ex) => ex.time--);
        explosions = explosions.filter((ex) => ex.time > 0);

        // Tembakan kena musuh
        bullets.forEach((b, bi) => {
          enemies.forEach((e, ei) => {
            if (
              b.x < e.x + e.width &&
              b.x + b.width > e.x &&
              b.y < e.y + e.height &&
              b.y + b.height > e.y
            ) {
              bullets.splice(bi, 1);
              enemies.splice(ei, 1);
              score += 10;
              explosions.push({
                x: e.x,
                y: e.y,
                time: 20,
              });
            }
          });
        });

        // Musuh tabrak pemain
        enemies.forEach((e) => {
          if (
            player.x < e.x + e.width &&
            player.x + player.width > e.x &&
            player.y < e.y + e.height &&
            player.y + player.height > e.y
          ) {
            gameOver = true;
          }
        });

        enemies = enemies.filter((e) => e.y < canvas.height + 50);

        stars.forEach((s) => {
          s.y += 2;

          if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
          }
        });

        while (enemies.length < enemyTarget) {
          createEnemy();
        }

        enemyTarget = Math.min(1 + Math.floor(score / 100), 15);
      }

      function drawPlayer2() {
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("✈️", player.x + 25, player.y + 45);
      }

      const jet = [
        "0000000010000000",
        "0000000111000000",
        "0000000111000000",
        "0000001101100000",
        "0000001101100000",
        "0000001101100000",
        "0000011000110000",
        "0000011010110000",
        "0000011000110000",
        "0000111000111000",
        "0001111000111100",
        "0011011000110110",
        "0110011000110011",
        "1100110000011001",
        "1001100000001101",
        "1011000011000111",
        "1110000111100011",
        "1100001100110001",
        "1000011000011001",
      ];

      function drawPlayer() {
        const pixel = 2;
        ctx.fillStyle = "black";

        for (let y = 0; y < jet.length; y++) {
          for (let x = 0; x < jet[y].length; x++) {
            if (jet[y][x] === "1") {
              ctx.fillRect(
                player.x + x * pixel,
                player.y + y * pixel,
                pixel,
                pixel,
              );
            }
          }
        }
      }

      const enemy = [
        "0000110000110000",
        "0001111001111000",
        "0011111111111100",
        "0111101111011110",
        "1111111111111111",
        "1101111111111011",
        "1111111111111111",
        "1110111111110111",
        "1111111111111111",
        "1101100000011011",
        "1000000000000001",
        "1100011001100011",
        "1110111001110111",
        "0111000000001110",
        "0011100000011100",
        "0000110000110000",
      ];

      function drawEnemy(e) {
        ctx.font = "35px Arial";
        ctx.textAlign = "center";
        // ctx.fillText("👾", e.x + 20, e.y + 30);
        drawSprite(enemy, e.x, e.y, 2);
      }

      function drawSprite(sprite, x, y, size = 3) {
        ctx.fillStyle = "black";

        for (let row = 0; row < sprite.length; row++) {
          for (let col = 0; col < sprite[row].length; col++) {
            if (sprite[row][col] === "1") {
              ctx.fillRect(x + col * size, y + row * size, size, size);
            }
          }
        }
      }

      const bullet = [
        "00100",
        "01110",
        "11111",
        "01110",
        "01110",
        "01110",
        "01110",
        "01110",
        "00100",
      ];

      const explosion = [
        "100010001",
        "011111110",
        "110101011",
        "111111111",
        "110101011",
        "011111110",
        "100010001",
      ];

      function draw() {
        // background putih
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // bintang
        ctx.fillStyle = "black";
        stars.forEach((s) => {
          ctx.fillRect(s.x, s.y, 2, 2);
        });

        // pesawat
        drawPlayer();

        // peluru
        ctx.font = "18px Arial";
        bullets.forEach((b) => {
          drawSprite(bullet, b.x, b.y, 2);
        });

        // musuh
        enemies.forEach(drawEnemy);

        // ledakan
        ctx.font = "30px Arial";
        explosions.forEach((b) => {
          drawSprite(explosion, b.x, b.y, 2);
        });

        explosions = explosions.filter((ex) => ex.time > 0);

        // skor
        ctx.fillStyle = "black";
        ctx.font = "20px monospace";
        ctx.fillText("SCORE : " + score, 20, 30);
        ctx.fillText("LIFE : " + life, canvas.width - 100, 30);

        if (gameOver) {
          ctx.font = "40px monospace";
          ctx.fillText("GAME OVER", 100, 320);

          ctx.font = "20px monospace";
          ctx.fillText("Tap layar untuk ulang", 120, 360);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      loop();
    </script>
  </body>
</html>
