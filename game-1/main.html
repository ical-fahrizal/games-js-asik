<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jet Shooter</title>
    <style>
      body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      canvas {
        background: white;
        border: 2px solid black;
      }
      #controls {
        position: fixed;
        bottom: 20px;
        width: 100%;
      }

      button {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="500" height="700"></canvas>
    <div id="controls">
      <button id="left">◀</button>
      <button id="up">▲</button>
      <button id="down">▼</button>
      <button id="right">▶</button>

      <button id="fire">FIRE</button>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const leftBtn = document.getElementById("left");
      leftBtn.addEventListener("touchstart", () => {
        keys["ArrowLeft"] = true;
      });
      leftBtn.addEventListener("touchend", () => {
        keys["ArrowLeft"] = false;
      });

      const rightBtn = document.getElementById("right");
      rightBtn.addEventListener("touchstart", () => {
        keys["ArrowRight"] = true;
      });
      rightBtn.addEventListener("touchend", () => {
        keys["ArrowRight"] = false;
      });

      const upBtn = document.getElementById("up");
      upBtn.addEventListener("touchstart", () => {
        keys["ArrowUp"] = true;
      });
      upBtn.addEventListener("touchend", () => {
        keys["ArrowUp"] = false;
      });

      const downBtn = document.getElementById("down");
      downBtn.addEventListener("touchstart", () => {
        keys["ArrowDown"] = true;
      });
      downBtn.addEventListener("touchend", () => {
        keys["ArrowDown"] = false;
      });

      const fireBtn = document.getElementById("fire");
      fireBtn.addEventListener("touchstart", () => {
        bullets.push({
          x: player.x + player.width / 2,
          y: player.y,
          width: 4,
          height: 15,
        });
      });

      let life = 3;
      let explosions = [];
      let stars = [];

      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
        });
      }

      let score = 0;
      let gameOver = false;

      const player = {
        x: 225,
        y: 600,
        width: 50,
        height: 60,
        speed: 6,
      };

      let bullets = [];
      let enemies = [];
      let keys = {};
      let timer = 0;

      document.addEventListener("keydown", (e) => {
        keys[e.key] = true;

        if (e.code === "Space" && !gameOver) {
          bullets.push({
            x: player.x + player.width / 2 - 2,
            y: player.y,
            width: 4,
            height: 15,
          });
        }

        if (gameOver && e.code === "Space") {
          location.reload();
        }
      });

      document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
      });

      function createEnemy() {
        enemies.push({
          x: Math.random() * 450,
          y: -40,
          width: 40,
          height: 40,
          speed: 3 + Math.random() * 2,
        });
      }

      function update() {
        if (gameOver) return;

        if (keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["ArrowRight"]) player.x += player.speed;
        if (keys["ArrowUp"]) player.y -= player.speed;
        if (keys["ArrowDown"]) player.y += player.speed;

        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(
          0,
          Math.min(canvas.height - player.height, player.y),
        );

        bullets.forEach((b) => (b.y -= 8));

        timer++;
        if (timer > 40) {
          createEnemy();
          timer = 0;
        }

        enemies.forEach((e) => (e.y += e.speed));

        // Tembakan kena musuh
        bullets.forEach((b, bi) => {
          enemies.forEach((e, ei) => {
            if (
              b.x < e.x + e.width &&
              b.x + b.width > e.x &&
              b.y < e.y + e.height &&
              b.y + b.height > e.y
            ) {
              bullets.splice(bi, 1);
              enemies.splice(ei, 1);
              score += 10;
              explosions.push({
                x: e.x,
                y: e.y,
                time: 20,
              });
            }
          });
        });

        // Musuh tabrak pemain
        enemies.forEach((e) => {
          if (
            player.x < e.x + e.width &&
            player.x + player.width > e.x &&
            player.y < e.y + e.height &&
            player.y + player.height > e.y
          ) {
            gameOver = true;
          }
        });
      }

      function drawPlayer2() {
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("✈️", player.x + 25, player.y + 45);
      }

      const jet = [
        "0000000010000000",
        "0000000111000000",
        "0000000111000000",
        "0000001101100000",
        "0000001101100000",
        "0000001101100000",
        "0000011000110000",
        "0000011010110000",
        "0000011000110000",
        "0000111000111000",
        "0001111000111100",
        "0011011000110110",
        "0110011000110011",
        "1100110000011001",
        "1001100000001101",
        "1011000011000111",
        "1110000111100011",
        "1100001100110001",
        "1000011000011001",
      ];

      function drawPlayer() {
        const pixel = 2;
        ctx.fillStyle = "black";

        for (let y = 0; y < jet.length; y++) {
          for (let x = 0; x < jet[y].length; x++) {
            if (jet[y][x] === "1") {
              ctx.fillRect(
                player.x + x * pixel,
                player.y + y * pixel,
                pixel,
                pixel,
              );
            }
          }
        }
      }

      const enemy = [
        "0000110000110000",
        "0001111001111000",
        "0011111111111100",
        "0111101111011110",
        "1111111111111111",
        "1101111111111011",
        "1111111111111111",
        "1110111111110111",
        "1111111111111111",
        "1101100000011011",
        "1000000000000001",
        "1100011001100011",
        "1110111001110111",
        "0111000000001110",
        "0011100000011100",
        "0000110000110000",
      ];

      function drawEnemy(e) {
        ctx.font = "35px Arial";
        ctx.textAlign = "center";
        // ctx.fillText("👾", e.x + 20, e.y + 30);
        drawSprite(enemy, e.x, e.y, 2);
      }

      function drawSprite(sprite, x, y, size = 3) {
        ctx.fillStyle = "black";

        for (let row = 0; row < sprite.length; row++) {
          for (let col = 0; col < sprite[row].length; col++) {
            if (sprite[row][col] === "1") {
              ctx.fillRect(x + col * size, y + row * size, size, size);
            }
          }
        }
      }

      const bullet = [
        "00100",
        "01110",
        "11111",
        "01110",
        "01110",
        "01110",
        "01110",
        "01110",
        "00100",
      ];

      const explosion = [
        "100010001",
        "011111110",
        "110101011",
        "111111111",
        "110101011",
        "011111110",
        "100010001",
      ];

      function draw() {
        // background putih
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 500, 700);

        // bintang
        ctx.fillStyle = "black";
        stars.forEach((s) => {
          ctx.fillRect(s.x, s.y, 2, 2);
        });

        // pesawat
        drawPlayer();

        // peluru
        ctx.font = "18px Arial";

        // bullets.forEach((b) => {
        //   ctx.textAlign = "center";
        //   ctx.fillText("🚀", b.x, b.y);
        // });
        bullets.forEach((b) => {
          drawSprite(bullet, b.x, b.y, 2);
        });

        // musuh
        enemies.forEach(drawEnemy);

        // ledakan
        ctx.font = "30px Arial";
        explosions.forEach((b) => {
          drawSprite(explosion, b.x, b.y, 2);
        });

        explosions = explosions.filter((ex) => ex.time > 0);

        // skor
        ctx.fillStyle = "black";
        ctx.font = "20px monospace";
        ctx.fillText("SCORE : " + score, 20, 30);
        ctx.fillText("LIFE : " + life, 390, 30);

        if (gameOver) {
          ctx.font = "40px monospace";
          ctx.fillText("GAME OVER", 100, 320);

          ctx.font = "20px monospace";
          ctx.fillText("Tekan R untuk ulang", 140, 360);
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      loop();
    </script>
  </body>
</html>
