<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jet Shooter</title>
    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      canvas {
        background: white;
        border: 2px solid black;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      button {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="500" height="700"></canvas>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      resizeCanvas();

      window.addEventListener("resize", resizeCanvas);

      let explosions = [];
      let stars = [];

      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
        });
      }

      let score = 0;
      let gameOver = false;

      const player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        width: 50,
        height: 60,
      };

      let bullets = [];
      let enemyTarget = 1;
      let enemies = [];
      let fireTimer = 0;
      let timer = 0;

      enemyTarget = Math.min(enemyTarget + 1, 20);

      function movePlayer(x, y) {
        player.x = x - player.width / 2;
        player.y = y - player.height / 2;

        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

        player.y = Math.max(
          0,
          Math.min(canvas.height - player.height, player.y),
        );
      }

      canvas.addEventListener("pointermove", (e) => {
        const rect = canvas.getBoundingClientRect();

        movePlayer(e.clientX - rect.left, e.clientY - rect.top);
      });

      canvas.addEventListener("pointerdown", () => {
        if (gameOver) {
          restartGame();
        }
      });

      function createEnemy() {
        enemies.push({
          x: Math.random() * (canvas.width - 50),
          y: -40,
          width: 40,
          height: 40,
          speed: 3 + Math.random() * 2,
        });
      }

      function update() {
        if (gameOver) return;

        fireTimer++;

        if (fireTimer >= 12) {
          bullets.push({
            x: player.x + 16,
            y: player.y,
            width: 4,
            height: 15,
          });

          fireTimer = 0;
        }

        bullets.forEach((b) => (b.y -= 8));
        bullets = bullets.filter((b) => b.y > -20);

        enemies.forEach((e) => (e.y += e.speed));

        explosions.forEach((ex) => ex.time--);
        explosions = explosions.filter((ex) => ex.time > 0);

        // Tembakan kena musuh
        bullets.forEach((b, bi) => {
          enemies.forEach((e, ei) => {
            if (
              b.x < e.x + e.width &&
              b.x + b.width > e.x &&
              b.y < e.y + e.height &&
              b.y + b.height > e.y
            ) {
              bullets.splice(bi, 1);
              enemies.splice(ei, 1);
              score += 10;
              explosions.push({
                x: e.x,
                y: e.y,
                time: 20,
              });
            }
          });
        });

        // Musuh tabrak pemain
        enemies.forEach((e) => {
          if (
            player.x < e.x + e.width &&
            player.x + player.width > e.x &&
            player.y < e.y + e.height &&
            player.y + player.height > e.y
          ) {
            gameOver = true;
          }
        });

        enemies = enemies.filter((e) => e.y < canvas.height + 50);

        stars.forEach((s) => {
          s.y += 2;

          if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
          }
        });

        while (enemies.length < enemyTarget) {
          createEnemy();
        }

        enemyTarget = Math.min(1 + Math.floor(score / 100), 15);
      }

      const jet = [
        "0000000030000000",
        "0000000343000000",
        "0000003444300000",
        "0000003444300000",
        "0000034434430000",
        "0000034434430000",
        "0000034444430000",
        "0000344424433000",
        "0003444424443000",
        "0034444424444300",
        "0344444424444430",
        "3442444424444243",
        "4422244424442224",
        "4222444000444224",
        "2244400330004442",
        "2444003333000442",
        "4440033443300044",
        "4400334004330004",
        "4000340000430004",
      ];

      const enemy = [
        "0000003333000000",
        "0000334444330000",
        "0003444444443000",
        "0034444444444300",
        "0344443434344430",
        "3444444444444443",
        "3444344444444343",
        "4444444444444444",
        "4443444444443444",
        "3444444444444443",
        "3344433333344433",
        "0333300220023330",
        "0033022222203300",
        "0003222222223000",
        "0000332222330000",
        "0000003333000000",
      ];

      function drawEnemy(e) {
        ctx.font = "35px Arial";
        ctx.textAlign = "center";
        drawSprite(enemy, e.x, e.y, 2);
      }

      function drawSprite(sprite, x, y, size = 2) {
        for (let row = 0; row < sprite.length; row++) {
          for (let col = 0; col < sprite[row].length; col++) {
            switch (sprite[row][col]) {
              case "1":
                ctx.fillStyle = "#dddddd";
                break;
              case "2":
                ctx.fillStyle = "#aaaaaa";
                break;
              case "3":
                ctx.fillStyle = "#666666";
                break;
              case "4":
                ctx.fillStyle = "#000000";
                break;
              default:
                continue;
            }

            ctx.fillRect(x + col * size, y + row * size, size, size);
          }
        }
      }

      const bullet = [
        "00300",
        "03430",
        "34443",
        "34443",
        "34443",
        "34443",
        "34443",
        "03430",
        "00300",
      ];

      const explosion = [
        "300030003",
        "034444430",
        "344242443",
        "444444444",
        "342424243",
        "034444430",
        "300030003",
      ];

      function draw() {
        // background putih
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // bintang
        ctx.fillStyle = "black";
        stars.forEach((s) => {
          ctx.fillRect(s.x, s.y, 2, 2);
        });

        // pesawat
        drawSprite(jet, player.x, player.y, 2);

        // peluru
        ctx.font = "18px Arial";
        bullets.forEach((b) => {
          drawSprite(bullet, b.x, b.y, 2);
        });

        // musuh
        enemies.forEach(drawEnemy);

        // ledakan
        ctx.font = "30px Arial";
        explosions.forEach((b) => {
          drawSprite(explosion, b.x, b.y, 2);
        });

        explosions = explosions.filter((ex) => ex.time > 0);

        // skor
        ctx.fillStyle = "black";
        ctx.font = "20px monospace";
        ctx.textAlign = "left";
        ctx.fillText("SCORE : " + score, 20, 30);

        if (gameOver) {
          ctx.fillStyle = "black";
          ctx.textAlign = "center";

          ctx.font = "40px monospace";
          ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

          ctx.font = "20px monospace";
          ctx.fillText(
            "Tap layar untuk main lagi",
            canvas.width / 2,
            canvas.height / 2 + 40,
          );
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      function restartGame() {
        score = 0;
        gameOver = false;

        bullets = [];
        enemies = [];
        explosions = [];

        enemyTarget = 1;
        fireTimer = 0;

        player.x = canvas.width / 2;
        player.y = canvas.height - 100;
      }

      loop();
    </script>
  </body>
</html>
